version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build: .
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn src.api.rag_api:app --host 0.0.0.0 --port 8002

  celery-worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A src.mcp.tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/data

  mcp-server:
    build: .
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: python -m src.mcp.mcp_server
    volumes:
      - ./data:/data

  rag-ui:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - rag-api
    command: streamlit run src/ui/rag_ui.py

volumes:
  redis_data:
