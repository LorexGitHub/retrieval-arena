services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build: .
    ports:
      - "8765:8002"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn src.api.rag_api:app --host 0.0.0.0 --port 8002
    volumes:
      - huggingface_cache:/root/.cache/huggingface

  celery-worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A src.mcp.tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/data
      - huggingface_cache:/root/.cache/huggingface

  mcp-sse:
    build: .
    ports:
      - "5100:5100"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: python -m uvicorn src.mcp.mcp_server:app --host 0.0.0.0 --port 5100
    volumes:
      - ./data:/data
      - huggingface_cache:/root/.cache/huggingface

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp-sse
      - rag-ui

  rag-ui:
    build: .
    ports:
      - "8766:8501"
    depends_on:
      - rag-api
    environment:
      - PYTHONPATH=/app
      - RAG_API_URL=http://rag-api:8002
    command: streamlit run src/ui/rag_ui.py

volumes:
  redis_data:
  huggingface_cache:
