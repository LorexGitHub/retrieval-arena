services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U rag
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build: .
    ports:
      - "8765:8002"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/rag
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn src.api.rag_api:app --host 0.0.0.0 --port 8002

  combined:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/rag
    depends_on:
      postgres:
        condition: service_healthy
    # Default CMD: uvicorn src.combined_app:app --host 0.0.0.0 --port 8000
    # Serves frontend (/) + REST API (/api/) + MCP (/mcp/)

  celery-worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/rag
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.mcp.tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/data

  mcp-sse:
    build: .
    ports:
      - "5100:5100"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/rag
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m uvicorn src.mcp.mcp_server:app --host 0.0.0.0 --port 5100
    volumes:
      - ./data:/data

  nginx:
    image: nginx:alpine
    profiles:
      - ci
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - combined

volumes:
  redis_data:
