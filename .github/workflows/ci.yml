name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Lint
        run: ruff check src/

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main'
      && env.DOCKER_USERNAME != ''
      && env.DOCKER_TOKEN != ''

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and Push Images
        run: |
          docker build -t $DOCKER_USERNAME/rag-api:latest .
          docker tag $DOCKER_USERNAME/rag-api:latest $DOCKER_USERNAME/rag-ui:latest
          docker push $DOCKER_USERNAME/rag-api:latest
          docker push $DOCKER_USERNAME/rag-ui:latest
