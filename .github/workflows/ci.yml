name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint
        run: ruff check src/

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/rag-api:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/rag-api:latest ${{ secrets.DOCKERHUB_USERNAME }}/rag-ui:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rag-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/rag-ui:latest
