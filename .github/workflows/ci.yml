name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Lint
        run: ruff check backend/

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if source files changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.before }} HEAD | grep -qE '^(backend/|Dockerfile|docker-compose.yaml|requirements.txt)'; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Check secrets and login
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — skipping build"
            exit 0
          fi
          echo "$TOKEN" | docker login -u "$USERNAME" --password-stdin

      - name: Build and Push Images
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        if: steps.check.outputs.build == 'true' && env.USERNAME != '' && env.TOKEN != ''
        run: |
          docker build -t $USERNAME/rag-api:latest .
          docker tag $USERNAME/rag-api:latest $USERNAME/rag-ui:latest
          docker push $USERNAME/rag-api:latest
          docker push $USERNAME/rag-ui:latest
